idea:
  title: Are induction heads a large source of leakage?
  domain: nlp
  hypothesis: 'Induction heads in language models may cause unintended leakage of
    patterned information from the text, even when the model should not be copying,
    potentially contributing to the model''s struggle to generate random outputs.

    '
  background:
    description: 'Induction heads allow models to copy data according to patterns
      that have been displayed in the text. They are active often even when the model
      isn''t directly, as they are believed to be responsible for pattern-matching
      behavior, e.g., ICL. But then the question is: do induction heads end-up leaking
      whatever is patterned in the text even when the model shouldn''t be copying
      something? Is this one of the reason models struggle to be random?

      '
  metadata:
